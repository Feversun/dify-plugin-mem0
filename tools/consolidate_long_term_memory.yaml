identity:
  name: consolidate_long_term_memory
  author: beersoccer
  label:
    en_US: Consolidate Long Term Memory
    zh_Hans: 长期记忆巩固
description:
  human:
    en_US: Incrementally scan Dify conversation history for specified users and consolidate long-term memories into Mem0 (semantic/episodic/procedural).
    zh_Hans: 对指定用户增量扫描 Dify 历史对话，并将长期记忆巩固写入 Mem0（semantic/episodic/procedural）。
  llm: Use this tool to consolidate long-term memories by scanning Dify conversation history for specified users up to run_at, extracting semantic/episodic/procedural memories, and writing them to Mem0 with subtype metadata.
parameters:
  - name: run_at
    type: string
    required: true
    label:
      en_US: Run At (ISO8601)
      zh_Hans: 运行截止时间（ISO8601）
    human_description:
      en_US: Required. Only messages with created_at <= run_at will be processed.
      zh_Hans: 必填。只处理 created_at <= run_at 的消息。
    llm_description: Required ISO8601 timestamp cutoff for processing.
    form: llm
  - name: user_ids
    type: string
    required: true
    label:
      en_US: User IDs
      zh_Hans: 用户ID列表
    human_description:
      en_US: Required. User IDs to process. Provide a JSON array string (recommended) or comma-separated list.
      zh_Hans: 必填。需要处理的 user_id 列表。建议传 JSON 数组字符串，或用英文逗号分隔。
    llm_description: Required list of user_ids (JSON array string recommended).
    form: llm
  - name: app_id
    type: string
    required: false
    label:
      en_US: App ID (optional)
      zh_Hans: 应用ID（可选）
    human_description:
      en_US: Optional. Limit scanning to one Dify app_id to avoid cross-app mixing.
      zh_Hans: 可选。限定只处理某个 app_id 的会话，避免跨应用混入。
    llm_description: Optional app_id scope filter.
    form: llm
  - name: max_users_per_run
    type: number
    required: false
    default: 100
    label:
      en_US: Max Users Per Run
      zh_Hans: 单次最多处理用户数
    human_description:
      en_US: Optional hard cap for user count in one run (default 100).
      zh_Hans: 可选。单次运行最多处理用户数硬上限（默认 100）。
    llm_description: Optional hard cap for number of users processed in this run.
    form: form
  - name: budget_tokens
    type: number
    required: false
    default: 200000
    label:
      en_US: Budget Tokens
      zh_Hans: Token 总预算
    human_description:
      en_US: Optional total token budget for this run (default 200000). Priority: semantic > episodic > procedural.
      zh_Hans: 可选。单次运行 token 总预算（默认 200000）。优先级：semantic > episodic > procedural。
    llm_description: Optional total token budget for this run.
    form: form
  - name: dify_base_url
    type: string
    required: true
    label:
      en_US: Dify Base URL
      zh_Hans: Dify Base URL
    human_description:
      en_US: Required. Example: http://localhost:5001
      zh_Hans: 必填。例如：http://localhost:5001
    llm_description: Required Dify base URL for API calls.
    form: llm
  - name: dify_api_key
    type: string
    required: true
    label:
      en_US: Dify API Key
      zh_Hans: Dify API Key
    human_description:
      en_US: Required. Dify API key with access to conversations/messages APIs.
      zh_Hans: 必填。需要可访问会话/消息接口的 Dify API Key。
    llm_description: Required Dify API key for API calls.
    form: llm
extra:
  python:
    source: tools/consolidate_long_term_memory.py


