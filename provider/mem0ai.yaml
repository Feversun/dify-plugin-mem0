identity:
  author: beersoccer
  name: mem0ai
  label:
    en_US: mem0ai
    zh_Hans: mem0ai
  description:
    en_US: mem0ai plugin, self-hosted mode, async_mode enabled by default.
    zh_Hans: mem0ai 插件，自托管模式，async_mode 默认开启。
  icon: mem0_plugin.png
  tags:
    - utilities
credentials_for_provider:
  async_mode:
    type: boolean
    required: false
    default: true
    label:
      en_US: Async Mode
      zh_Hans: 异步模式
    help:
      en_US: "When async mode is enabled, all Mem0 operations run asynchronously and concurrently. Search waits for results; Add does not."
      zh_Hans: "开启异步模式后，所有Mem0的操作都异步并发执行，Search操作会等待返回结果而Add操作不会。"
  local_llm_json_secret:
    type: secret-input
    required: true
    label:
      en_US: LLM Configuration
      zh_Hans: LLM 配置
    placeholder:
      en_US: '{"provider":"azure_openai","config":{"model":"gpt-4","api_key":"..."}}'
      zh_Hans: '{"provider":"azure_openai","config":{"model":"gpt-4","api_key":"..."}}'
    help:
      en_US: "LLM provider configuration. Supported: azure_openai, openai, anthropic, etc. Use this field for new installations."
      zh_Hans: "LLM 提供商配置。支持：azure_openai、openai、anthropic 等。新安装请使用此字段。"
  local_embedder_json_secret:
    type: secret-input
    required: true
    label:
      en_US: Embedder Configuration
      zh_Hans: 向量模型配置
    placeholder:
      en_US: '{"provider":"azure_openai","config":{"model":"text-embedding-ada-002","api_key":"..."}}'
      zh_Hans: '{"provider":"azure_openai","config":{"model":"text-embedding-ada-002","api_key":"..."}}'
    help:
      en_US: "Embedding model configuration. Supported: azure_openai, openai, huggingface, etc. Use this field for new installations."
      zh_Hans: "向量模型配置。支持：azure_openai、openai、huggingface 等。新安装请使用此字段。"
  local_vector_db_json_secret:
    type: secret-input
    required: true
    label:
      en_US: Vector Database Configuration
      zh_Hans: 向量数据库配置
    placeholder:
      en_US: '{"provider":"pgvector","config":{"dbname":"mem0","user":"postgres","password":"...","host":"localhost"}}'
      zh_Hans: '{"provider":"pgvector","config":{"dbname":"mem0","user":"postgres","password":"...","host":"localhost"}}'
    help:
      en_US: "Vector database configuration. Supported: pgvector, milvus, qdrant, etc. Use this field for new installations."
      zh_Hans: "向量数据库配置。支持：pgvector、milvus、qdrant 等。新安装请使用此字段。"
  local_graph_db_json_secret:
    type: secret-input
    required: false
    label:
      en_US: Graph Database Configuration
      zh_Hans: 图数据库配置
    placeholder:
      en_US: '{"provider":"neo4j","config":{"url":"bolt://localhost:7687","username":"neo4j","password":"..."}}'
      zh_Hans: '{"provider":"neo4j","config":{"url":"bolt://localhost:7687","username":"neo4j","password":"..."}}'
    help:
      en_US: "Optional graph database configuration for relationship storage. Use this field for new installations."
      zh_Hans: "可选的图数据库配置用于存储关系。新安装请使用此字段。"
  local_reranker_json_secret:
    type: secret-input
    required: false
    label:
      en_US: Reranker Configuration
      zh_Hans: 重排序模型配置
    placeholder:
      en_US: '{"provider":"cohere","config":{"model":"rerank-english-v2.0","api_key":"..."}}'
      zh_Hans: '{"provider":"cohere","config":{"model":"rerank-english-v2.0","api_key":"..."}}'
    help:
      en_US: "Optional reranker configuration for search result optimization. Use this field for new installations."
      zh_Hans: "可选的重排序模型配置用于优化搜索结果。新安装请使用此字段。"
  max_concurrent_memory_operations:
    type: text-input
    required: false
    default: "40"
    label:
      en_US: Max Concurrent Memory Operations
      zh_Hans: 最大并发记忆操作数
    help:
      en_US: "Maximum number of concurrent async Mem0 operations per process (search/add/get/get_all/update/delete/delete_all/history). For production environments, it is recommended to set this value greater than 20. If not configured, the default value 40 is used."
      zh_Hans: "每个进程允许的 Mem0 异步记忆操作最大并发数（包含 search/add/get/get_all/update/delete/delete_all/history 等所有操作）。生产环境建议大于 20；如果未配置，则使用默认值 40。"
  pgvector_min_connections:
    type: text-input
    required: false
    default: "10"
    label:
      en_US: PGVector Min Connections
      zh_Hans: PGVector 最小连接数
    help:
      en_US: "Minimum number of connections in the PGVector connection pool. If not configured, the default value 10 is used."
      zh_Hans: "PGVector 连接池中的最小连接数。如果未配置，则使用默认值 10。"
  pgvector_max_connections:
    type: text-input
    required: false
    default: "40"
    label:
      en_US: PGVector Max Connections
      zh_Hans: PGVector 最大连接数
    help:
      en_US: "Maximum number of connections in the PGVector connection pool. It is recommended to keep this value consistent with max_concurrent_memory_operations in production environments. If not configured, the default value 40 is used."
      zh_Hans: "PGVector 连接池中的最大连接数。生产环境中建议与 max_concurrent_memory_operations 保持一致。如果未配置，则使用默认值 40。"
  log_level:
    type: select
    required: false
    default: "INFO"
    label:
      en_US: Log Level
      zh_Hans: 日志级别
    help:
      en_US: "Log level for memory operations. Default is INFO. Set to DEBUG for detailed troubleshooting. Can be changed online without redeployment."
      zh_Hans: "记忆操作的日志级别。默认为 INFO。设置为 DEBUG 可查看详细调试信息。可在线修改无需重新部署。"
    options:
      - value: INFO
        label:
          en_US: INFO (Default)
          zh_Hans: INFO (默认)
      - value: DEBUG
        label:
          en_US: DEBUG (Detailed)
          zh_Hans: DEBUG (详细)
      - value: WARNING
        label:
          en_US: WARNING (Warnings Only)
          zh_Hans: WARNING (仅警告)
      - value: ERROR
        label:
          en_US: ERROR (Errors Only)
          zh_Hans: ERROR (仅错误)

tools:
  - tools/add_memory.yaml
  - tools/search_memory.yaml
  - tools/get_all_memories.yaml
  - tools/get_memory.yaml
  - tools/update_memory.yaml
  - tools/delete_memory.yaml
  - tools/delete_all_memories.yaml
  - tools/get_memory_history.yaml
extra:
  python:
    source: provider/mem0ai.py
